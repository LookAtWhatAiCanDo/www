# This file was initially auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  # Auto-refresh every Monday at 7am UTC
  schedule:
    - cron: '0 7 * * 1'

  # Deploy on every push to main
  push:
    branches:
      - main

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual refresh'

jobs:
  build_and_deploy:
    name: Fetch Projects & Deploy to Firebase Live
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub projects
        run: node scripts/fetch-projects.js
        env:
          # GITHUB_TOKEN is automatically available in Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify projects.json was created
        run: |
          echo "--- Generated projects.json ---"
          cat public/data/projects.json
          echo ""
          echo "--- File size ---"
          wc -c public/data/projects.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOOKATWHATAICANDO_1337 }}
          channelId: live
          projectId: lookatwhataicando-1337
