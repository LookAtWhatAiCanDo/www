name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    name: Fetch Projects & Deploy to Firebase Preview
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub projects
        run: node scripts/fetch-projects.js
        env:
          # GITHUB_TOKEN is automatically available in Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify projects.json was created
        run: |
          echo "--- Generated projects.json ---"
          cat public/data/projects.json
          echo ""
          echo "--- File size ---"
          wc -c public/data/projects.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOOKATWHATAICANDO_1337 }}
          projectId: lookatwhataicando-1337
